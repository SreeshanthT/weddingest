# simple GitLab CI pipeline to build and deploy the static site to GitHub
# requires a CI variable GITHUB_TOKEN with repo:push permission

image: node:18

stages:
  - test
  - deploy

before_script:
  - echo "Running pipeline on $CI_COMMIT_BRANCH"

test_job:
  stage: test
  script:
    - npm install
    # tests are optional; if you don't have any yet, this will succeed
    - npm test || echo "no tests defined"
  only:
    - main
    - master


deploy_to_github:
  stage: deploy
  script:
    - git config --global user.email "ci@example.com"
    - git config --global user.name "GitLab CI"
    - |
      # push the contents of the repo to GitHub
      # make sure GITHUB_TOKEN is defined in CI settings
      git remote add github https://$GITHUB_TOKEN@github.com/SreeshanthT/weddingest.git
      # GitLab clones in detached HEAD so we may not have a local branch name;
      # push the current HEAD explicitly to the target branch instead of
      # referring to a possibly-missing refspec.
      git push --force github HEAD:$CI_COMMIT_REF_NAME
  only:
    - main
    - master
